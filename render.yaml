services:
  - type: web
    name: mitrabot
    runtime: python
    buildCommand: cd server && pip install -r requirements.txt && cd ../client && npm ci && npm run build
    startCommand: cd server && gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_ENV
        value: test
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SECURITY_PASSWORD_SALT
        generateValue: true
      - key: VITE_API_URL
        value: ""
